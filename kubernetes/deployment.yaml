apiVersion: apps/v1
kind: Deployment
metadata:
  name: zomato-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: zomato-container
        image: 356627769525.dkr.ecr.ap-south-1.amazonaws.com/zomato-app:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
